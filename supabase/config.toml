# Minimal config for Supabase CLI (link, db push, functions deploy).
# See https://supabase.com/docs/guides/cli/config

project_id = "parking-trade"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"

[edge_runtime]
enabled = true

# places-autocomplete is a public proxy (no auth needed; API key is server-side).
[functions.places-autocomplete]
verify_jwt = false
