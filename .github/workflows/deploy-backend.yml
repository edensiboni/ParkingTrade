# ⚠️  MANUAL / EMERGENCY USE ONLY
#
# Normal deployments are handled by the "deploy" job inside ci.yml, which is
# gated on both migration verification and Flutter analysis passing.
#
# This workflow exists solely as a manual escape hatch — for example, when you
# need to push a hotfix migration or redeploy Edge Functions without waiting for
# the full CI pipeline (e.g., after a direct hotfix commit to a release branch).
#
# Trigger: workflow_dispatch only (no automatic triggers).
#
# Required GitHub secrets:
#   SUPABASE_ACCESS_TOKEN   — personal access token for Supabase CLI
#   SUPABASE_PROJECT_REF    — project ref (e.g. njlbcrcoogpblscvjfah)
#   SUPABASE_DB_PASSWORD    — database password

name: Deploy backend (manual / emergency)

on:
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        run: supabase db push --include-all --yes

      - name: Deploy Edge Functions
        run: |
          for fn in \
            approve-booking \
            admin-bulk-import \
            create-booking-request \
            create-building \
            create-building-admin \
            create-join-request \
            handle-join-request \
            manage-member \
            places-autocomplete \
            send-chat-message \
          ; do
            echo "▶ Deploying $fn..."
            supabase functions deploy "$fn"
          done
          echo "✅ All Edge Functions deployed."
