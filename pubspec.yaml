name: parking_trade
description: A building-gated parking swap app for high-rise residents
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # State Management
  provider: ^6.1.1
  
  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  
  # Local Notifications
  flutter_local_notifications: ^16.3.0
  
  # Push Notifications (FCM)
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  
  # Utils
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

